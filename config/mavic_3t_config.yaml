indooruav_dji_driver:
  dji_mavic_3t:
    topics:
      command_in_dji_body_fru: "/PSDK/DjiFlightController/CommandInDjiBodyFRU"

    services:
      takeoff: "/PSDK/DjiFlightController/TakeOffService"
      landing: "/PSDK/DjiFlightController/LandingService"
      camera_shoot_photo: "/PSDK/DjiCameraController/CameraShootPhoto"
      gimbal_pitch_angle_in_deg: "/PSDK/DjiGimbalController/GimbalPitchAngleInDegService"

    parameters:
      rc_value_detection_frequency_hz: 10.0
      rc_zero_deadband: 0.02
      rid_info:
        latitude_rad: 0.0
        longitude_rad: 0.0
        altitude_m: 0

      application:
        alias: "PSDK_APPALIAS"
        serial_number: "PSDK18866738158XX"
        log_path: "Logs/DJI"
