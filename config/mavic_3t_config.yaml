indooruav_dji_driver:
  dji_mavic_3t:
    topics:
      # 两路输入都应位于同一个地面/world FLU 参考系下，类型均为 nav_msgs/Odometry
      desired_odometry: "/indooruav/desired_odometry"
      current_odometry: "/Odometry_global_rotate"

    services:
      takeoff: "/PSDK/DjiFlightController/TakeOffService"
      landing: "/PSDK/DjiFlightController/LandingService"
      camera_shoot_photo: "/PSDK/DjiCameraController/CameraShootPhoto"
      gimbal_pitch_angle_in_deg: "/PSDK/DjiGimbalController/GimbalPitchAngleInDegService"

    parameters:
      rc_value_detection_frequency_hz: 10.0
      rc_zero_deadband: 0.02
      rc_control_return_delay_s: 5.0

      takeoff:
        motor_started_timeout_cycles: 20
        in_air_timeout_cycles: 110

      rid_info:
        latitude_rad: 0.0
        longitude_rad: 0.0
        altitude_m: 0

      position_control:
        subscriber_queue_size: 20
        sync_queue_size: 50
        sync_max_interval_s: 0.05
        control_frequency_hz: 30.0
        odometry_timeout_s: 0.2
        send_zero_on_timeout: true

        x:
          kp: 0.8
          ki: 0.0
          kd: 0.0
          deadband_m: 0.10
          output_limit_mps: 1.0

        y:
          kp: 0.8
          ki: 0.0
          kd: 0.0
          deadband_m: 0.10
          output_limit_mps: 1.0

        z:
          kp: 0.8
          ki: 0.0
          kd: 0.0
          deadband_m: 0.10
          output_limit_mps: 0.8

        yaw:
          kp: 1.2
          ki: 0.0
          kd: 0.0
          deadband_rad: 0.10  # about 5.73 deg
          output_limit_radps: 0.5236  # 30 deg/s
